name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # weekly Mon 06:00 UTC — catch Mathlib CDN / toolchain drift
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Schema, generated views, and path checks — always (docs-only PRs stay cheap).
  agent-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Cheap agent gate
        run: ./scripts/agent_gate.sh
      # Onboarding contract: setup.sh must parse, document itself, reject bad
      # options, and run the docs-only (--pointer) path. This job is unfiltered,
      # so a PR that breaks the onboarding script can no longer stay green.
      - name: Smoke-test onboarding (setup.sh contract)
        run: |
          set -euo pipefail
          bash -n scripts/setup.sh
          scripts/setup.sh --help >/dev/null
          if scripts/setup.sh --bogus >/dev/null 2>&1; then
            echo "setup.sh accepted an unknown option — expected non-zero exit" >&2
            exit 1
          fi
          scripts/setup.sh --pointer

  # Lean build + axioms only when Lean toolchain or sources change.
  lean:
    needs: agent-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      run_lean: ${{ steps.filter.outputs.run_lean }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Decide whether Lean build is required
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          pattern='(\.lean$|^lakefile\.toml$|^lake-manifest\.json$|^lean-toolchain$|^scripts/lean_build_targets\.txt$|^scripts/check_print_axioms\.py$|^scripts/agent_gate\.sh$|^\.github/workflows/ci\.yml$)'
          run_lean=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            run_lean=true
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Release tag: full Lean verification.
            run_lean=true
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # main receives only PR merges, already Lean-verified by the required
            # PR check; skip the redundant rebuild. Tag pushes + the weekly
            # schedule provide the on-main safety net (CDN / toolchain drift).
            run_lean=false
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            if git diff --name-only "$base" "$head" | grep -E "$pattern" >/dev/null; then
              run_lean=true
            fi
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              if git diff --name-only "$before" "${{ github.sha }}" | grep -E "$pattern" >/dev/null; then
                run_lean=true
              fi
            else
              run_lean=true
            fi
          fi
          echo "run_lean=$run_lean" >> "$GITHUB_OUTPUT"
          echo "Lean build required: $run_lean"
      - name: Skip notice
        if: steps.filter.outputs.run_lean != 'true'
        run: echo "No Lean-related paths changed; skipping lake build and axiom check."
      # Cache only Foundation (full Gödel I/II, source-built — not in the Mathlib
      # CDN cache). Mathlib and its deps come from `lake exe cache get` each run,
      # so we never tar/restore gigabytes of Mathlib oleans. Keyed on the
      # toolchain + manifest; the prefix restore-key reuses a prior Foundation
      # build across manifest bumps (lake revalidates traces).
      - name: Cache Foundation build (skip cold Gödel rebuild)
        if: steps.filter.outputs.run_lean == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lake/packages/Foundation
          key: foundation-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            foundation-${{ runner.os }}-${{ runner.arch }}-
      # Cache only the atlas library's OWN build output (MB). Mathlib/Foundation
      # oleans live under .lake/packages and are never tarred here, so no 10 GB
      # repo-cache-cap risk. Lake revalidates traces, so a prefix-restored stale
      # olean set just triggers targeted rebuilds — this makes the atlas compile
      # incremental as the tree grows instead of cold every run.
      - name: Cache atlas oleans (incremental atlas compile; Mathlib excluded)
        if: steps.filter.outputs.run_lean == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lake/build
          key: atlas-olean-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json', 'AISafetyAtlas/**/*.lean') }}
          restore-keys: |
            atlas-olean-${{ runner.os }}-${{ runner.arch }}-
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
        if: steps.filter.outputs.run_lean == 'true'
        with:
          # Mathlib oleans via CDN (fast); do not GitHub-cache the whole .lake
          # (multi-GB, slow tar, risks the 10 GB repo cache cap → evictions).
          use-mathlib-cache: "true"
          use-github-cache: "false"
      - name: Compile explicit non-root Lean targets
        if: steps.filter.outputs.run_lean == 'true'
        run: xargs lake build < scripts/lean_build_targets.txt
      - name: Kernel axiom check for headline declarations
        if: steps.filter.outputs.run_lean == 'true'
        run: python3 scripts/check_print_axioms.py
