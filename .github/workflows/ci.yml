name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate survey registry
        run: python3 scripts/validate_registry.py
      - name: Validate landscape ledger
        run: python3 scripts/validate_landscape.py
      - name: Check generated registry views
        run: python3 scripts/generate_registry_views.py --check
      - name: Validate current repository state
        run: python3 scripts/validate_current_state.py
      - name: Check relative documentation paths
        run: python3 scripts/check_docs_paths.py
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1
      - name: Compile explicit non-root Lean targets
        run: xargs lake build < scripts/lean_build_targets.txt
      - name: Kernel axiom check for headline declarations
        run: python3 scripts/check_print_axioms.py
